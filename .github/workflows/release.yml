name: Build VSIX

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Abhaengigkeiten installieren
        run: npm ci

      - name: VSIX bauen
        run: npx @vscode/vsce package

      - name: VSIX als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: '*.vsix'

      - name: Release mit VSIX erstellen
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'

      - name: Im VS Code Marketplace veroeffentlichen
        if: startsWith(github.ref, 'refs/tags/') && env.VSCE_PAT != ''
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --packagePath *.vsix --pat "$VSCE_PAT"
