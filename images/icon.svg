<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="clip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#d0d8e8"/>
    </linearGradient>
  </defs>

  <!-- Hintergrund: abgerundetes Rechteck -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bg)" stroke="#2a4a7a" stroke-width="2"/>

  <!-- Clipboard-Grundform -->
  <rect x="34" y="24" width="60" height="76" rx="6" ry="6" fill="url(#clip)" stroke="#1e3a5f" stroke-width="2"/>

  <!-- Klammern oben -->
  <rect x="56" y="18" width="16" height="12" rx="3" ry="3" fill="#f0f4ff" stroke="#1e3a5f" stroke-width="2"/>

  <!-- Code-Zeilen (funktion) -->
  <text x="44" y="56" font-family="Consolas, monospace" font-size="11" font-weight="bold" fill="#1e3a5f">function</text>
  <text x="44" y="72" font-family="Consolas, monospace" font-size="9" fill="#2a4a7a">  param(</text>
  <text x="44" y="86" font-family="Consolas, monospace" font-size="9" fill="#2a4a7a">    $val )</text>

  <!-- Gelbe/grüne Markierungs-Streifen (Dekoration) -->
  <rect x="32" y="44" width="4" height="16" rx="2" ry="2" fill="#f5c542" opacity="0.9"/>
  <rect x="32" y="62" width="4" height="28" rx="2" ry="2" fill="#5acc6a" opacity="0.9"/>

  <!-- Live-Pfeil (erneuern-Symbol) unten rechts -->
  <g transform="translate(82, 88)" stroke="#1e3a5f" stroke-width="2" fill="none" stroke-linecap="round">
    <circle cx="12" cy="12" r="10"/>
    <polyline points="16,8 18,12 14,12" fill="#1e3a5f" stroke="none"/>
    <polyline points="8,16 6,12 10,12" fill="#1e3a5f" stroke="none"/>
  </g>
</svg>
